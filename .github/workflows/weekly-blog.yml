name: Weekly Blog Post

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9:00 AM UTC
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node scripts/generate-blog-post.mjs

      - name: Commit and push
        run: |
          git config --global user.name  "MAPL TECH Blog Bot"
          git config --global user.email "blog-bot@mapltech.com"
          git add src/data/blog-posts.ts
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "feat(blog): weekly post — $(date +'%B %-d, %Y')"
          git push
