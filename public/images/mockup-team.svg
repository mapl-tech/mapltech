<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <rect width="600" height="400" fill="#0a0a0a"/>
  <!-- Central connected network -->
  <!-- Connection lines -->
  <line x1="300" y1="160" x2="180" y2="100" stroke="#F03350" stroke-width="1" opacity="0.2"/>
  <line x1="300" y1="160" x2="420" y2="100" stroke="#F03350" stroke-width="1" opacity="0.2"/>
  <line x1="300" y1="160" x2="160" y2="240" stroke="#33F0D0" stroke-width="1" opacity="0.2"/>
  <line x1="300" y1="160" x2="440" y2="240" stroke="#33F0D0" stroke-width="1" opacity="0.2"/>
  <line x1="300" y1="160" x2="220" y2="320" stroke="#F03350" stroke-width="1" opacity="0.15"/>
  <line x1="300" y1="160" x2="380" y2="320" stroke="#F03350" stroke-width="1" opacity="0.15"/>
  <!-- Cross connections -->
  <line x1="180" y1="100" x2="160" y2="240" stroke="#222" stroke-width="0.5"/>
  <line x1="420" y1="100" x2="440" y2="240" stroke="#222" stroke-width="0.5"/>
  <line x1="160" y1="240" x2="220" y2="320" stroke="#222" stroke-width="0.5"/>
  <line x1="440" y1="240" x2="380" y2="320" stroke="#222" stroke-width="0.5"/>
  <!-- Central hub -->
  <circle cx="300" cy="160" r="36" fill="#151515" stroke="#F03350" stroke-width="1.5" opacity="0.8"/>
  <circle cx="300" cy="160" r="24" fill="#1a1a1a"/>
  <rect x="288" y="150" width="24" height="4" rx="1" fill="#F03350" opacity="0.7"/>
  <rect x="291" y="158" width="18" height="3" rx="1" fill="#F03350" opacity="0.4"/>
  <rect x="294" y="165" width="12" height="3" rx="1" fill="#F03350" opacity="0.3"/>
  <!-- Team member nodes -->
  <!-- Top left -->
  <circle cx="180" cy="100" r="28" fill="#151515" stroke="#222" stroke-width="1"/>
  <circle cx="180" cy="92" r="10" fill="#333"/>
  <rect x="168" y="108" width="24" height="3" rx="1" fill="#ccc"/>
  <!-- Top right -->
  <circle cx="420" cy="100" r="28" fill="#151515" stroke="#222" stroke-width="1"/>
  <circle cx="420" cy="92" r="10" fill="#333"/>
  <rect x="408" y="108" width="24" height="3" rx="1" fill="#ccc"/>
  <!-- Mid left -->
  <circle cx="160" cy="240" r="28" fill="#151515" stroke="#33F0D0" stroke-width="1" opacity="0.6"/>
  <circle cx="160" cy="232" r="10" fill="#333"/>
  <rect x="148" y="248" width="24" height="3" rx="1" fill="#ccc"/>
  <!-- Mid right -->
  <circle cx="440" cy="240" r="28" fill="#151515" stroke="#33F0D0" stroke-width="1" opacity="0.6"/>
  <circle cx="440" cy="232" r="10" fill="#333"/>
  <rect x="428" y="248" width="24" height="3" rx="1" fill="#ccc"/>
  <!-- Bottom left -->
  <circle cx="220" cy="320" r="24" fill="#151515" stroke="#222" stroke-width="1"/>
  <circle cx="220" cy="313" r="8" fill="#333"/>
  <rect x="210" y="326" width="20" height="3" rx="1" fill="#999"/>
  <!-- Bottom right -->
  <circle cx="380" cy="320" r="24" fill="#151515" stroke="#222" stroke-width="1"/>
  <circle cx="380" cy="313" r="8" fill="#333"/>
  <rect x="370" y="326" width="20" height="3" rx="1" fill="#999"/>
  <!-- Floating info cards -->
  <rect x="50" y="140" width="80" height="50" rx="8" fill="#151515" stroke="#222" stroke-width="0.8"/>
  <rect x="62" y="152" width="30" height="4" rx="1" fill="#F03350" opacity="0.5"/>
  <rect x="62" y="160" width="50" height="3" rx="1" fill="#555"/>
  <rect x="62" y="167" width="40" height="3" rx="1" fill="#444"/>
  <rect x="470" y="140" width="80" height="50" rx="8" fill="#151515" stroke="#222" stroke-width="0.8"/>
  <rect x="482" y="152" width="35" height="4" rx="1" fill="#33F0D0" opacity="0.5"/>
  <rect x="482" y="160" width="50" height="3" rx="1" fill="#555"/>
  <rect x="482" y="167" width="45" height="3" rx="1" fill="#444"/>
  <!-- Pulse rings on center -->
  <circle cx="300" cy="160" r="50" fill="none" stroke="#F03350" stroke-width="0.5" opacity="0.15"/>
  <circle cx="300" cy="160" r="70" fill="none" stroke="#F03350" stroke-width="0.3" opacity="0.08"/>
</svg>