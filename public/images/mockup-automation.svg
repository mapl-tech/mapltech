  <rect x="200" y="95" width="100" height="44" rx="8" fill="#1a1a1a" stroke="#F03350" stroke-width="1" opacity="0.8"/>
  <rect x="212" y="105" width="14" height="14" rx="3" fill="#F03350" opacity="0.3"/>
  <rect x="232" y="107" width="55" height="6" rx="1" fill="#fff" opacity="0.7"/>
  <rect x="232" y="118" width="40" height="4" rx="1" fill="#666"/>
  <!-- Arrow 1 -->
  <line x1="300" y1="117" x2="330" y2="117" stroke="#F03350" stroke-width="1.5" opacity="0.4"/>
  <polygon points="328,112 338,117 328,122" fill="#F03350" opacity="0.4"/>
  <!-- Node 2 -->
  <rect x="340" y="95" width="100" height="44" rx="8" fill="#1a1a1a" stroke="#33F0D0" stroke-width="1" opacity="0.6"/>
  <rect x="352" y="105" width="14" height="14" rx="3" fill="#33F0D0" opacity="0.3"/>
  <rect x="372" y="107" width="50" height="6" rx="1" fill="#fff" opacity="0.7"/>
  <rect x="372" y="118" width="35" height="4" rx="1" fill="#666"/>
  <!-- Arrow down from node 2 -->
  <line x1="390" y1="139" x2="390" y2="165" stroke="#33F0D0" stroke-width="1.5" opacity="0.4"/>
  <polygon points="385,163 390,173 395,163" fill="#33F0D0" opacity="0.4"/>
  <!-- Node 3 -->
  <rect x="340" y="175" width="100" height="44" rx="8" fill="#1a1a1a" stroke="#F03350" stroke-width="1" opacity="0.6"/>
  <rect x="352" y="185" width="14" height="14" rx="3" fill="#F03350" opacity="0.3"/>
  <rect x="372" y="187" width="45" height="6" rx="1" fill="#fff" opacity="0.7"/>
  <rect x="372" y="198" width="55" height="4" rx="1" fill="#666"/>
  <!-- Arrow left -->
  <line x1="340" y1="197" x2="310" y2="197" stroke="#F03350" stroke-width="1.5" opacity="0.4"/>
  <polygon points="312,192 302,197 312,202" fill="#F03350" opacity="0.4"/>
  <!-- Node 4 -->
  <rect x="200" y="175" width="100" height="44" rx="8" fill="#1a1a1a" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
  <rect x="212" y="185" width="14" height="14" rx="3" fill="#33F0D0" opacity="0.3"/>
  <rect x="232" y="187" width="55" height="6" rx="1" fill="#fff" opacity="0.7"/>
  <rect x="232" y="198" width="42" height="4" rx="1" fill="#666"/>
  <!-- Bottom metrics -->
  <rect x="200" y="245" width="130" height="70" rx="8" fill="#151515" stroke="#222" stroke-width="0.8"/>
  <text x="215" y="267" fill="#F03350" font-family="sans-serif" font-size="22" font-weight="bold" opacity="0.8">847</text>
