  <rect x="345" y="245" width="130" height="70" rx="8" fill="#151515" stroke="#222" stroke-width="0.8"/>
  <text x="360" y="267" fill="#33F0D0" font-family="sans-serif" font-size="22" font-weight="bold" opacity="0.8">95%</text>
  <rect x="360" y="278" width="55" height="5" rx="1" fill="#666"/>
  <rect x="360" y="290" width="95" height="14" rx="3" fill="#33F0D0" opacity="0.08"/>
  <rect x="365" y="293" width="80" height="8" rx="2" fill="#33F0D0" opacity="0.4"/>
